{% extends "layout.html" %}
{% block content %}
<div class="row h-100">
    <div class="col-md-5">
        <div class="card shadow-sm h-100">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">Current Order</h5>
            </div>
            <div class="card-body d-flex flex-column">
                
                <div class="table-responsive flex-grow-1 mb-3" style="max-height: 300px; overflow-y: auto;">
                    <table class="table table-sm table-striped align-middle">
                        <thead class="table-light sticky-top">
                            <tr>
                                <th>Item</th>
                                <th style="width: 50px;">Qty</th>
                                <th style="width: 70px;">Disc.</th>
                                <th>Subtotal</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="cartBody"></tbody>
                    </table>
                    <div id="emptyCartMsg" class="text-center text-muted mt-5">
                        <p>Cart is empty</p>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center border-top pt-3 mb-3">
                    <h4>Total:</h4>
                    <h3 class="text-primary">Rs. <span id="grandTotal">0</span></h3>
                </div>

                <div class="bg-light p-3 rounded">
                    <input type="text" id="custName" class="form-control form-control-sm mb-2" placeholder="Customer Name">
                    <input type="text" id="custPhone" class="form-control form-control-sm mb-2" placeholder="Phone Number">
                    <textarea id="custAddress" class="form-control form-control-sm mb-2" rows="2" placeholder="Delivery Address"></textarea>
                    <button onclick="submitOrder()" class="btn btn-success w-100 fw-bold">CONFIRM ORDER</button>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-7">
        <div class="input-group mb-3">
            <span class="input-group-text bg-white">🔍</span>
            <input type="text" id="searchInput" class="form-control" placeholder="Search..." onkeyup="filterProducts()">
        </div>

        <div class="row row-cols-1 row-cols-md-3 g-3" id="productGrid" style="max-height: 80vh; overflow-y: auto;">
            {% for p in products %}
            <div class="col product-card-col" data-name="{{ p.name.lower() }} {{ p.sku.lower() if p.sku else '' }}">
                <div class="card h-100 shadow-sm border-0" onclick="addToCart({{ p.id }}, '{{ p.name }}', '{{ p.size }}', {{ p.price }}, {{ p.stock }})" style="cursor: pointer;">
                    <div style="height: 150px; overflow: hidden; background-color: #f8f9fa;" class="d-flex align-items-center justify-content-center">
                        {% if p.image %}
                        <img src="{{ url_for('static', filename='uploads/' + p.image) }}" style="width: 100%; height: 100%; object-fit: cover;">
                        {% else %}
                        <span class="text-muted small">No Img</span>
                        {% endif %}
                    </div>
                    <div class="card-body p-2 text-center">
                        <h6 class="card-title mb-1 text-truncate">{{ p.name }}</h6>
                        <span class="badge bg-light text-dark border">{{ p.size }}</span>
                        <div class="mt-2 text-primary fw-bold">Rs. {{ p.price }}</div>
                        <small class="text-muted">Stock: {{ p.stock }}</small>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<script>
    let cart = [];

    function filterProducts() {
        const input = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.getElementsByClassName('product-card-col');
        for (let card of cards) card.style.display = card.getAttribute('data-name').includes(input) ? "" : "none";
    }

    function addToCart(id, name, size, price, maxStock) {
        const existingItem = cart.find(i => i.id === id);
        if (existingItem) {
            if (existingItem.qty >= maxStock) { return alert("Limit reached!"); }
            existingItem.qty++;
        } else {
            cart.push({ id, name, size, price, qty: 1, maxStock, discount: 0 });
        }
        renderCart();
    }

    function renderCart() {
        const tbody = document.getElementById('cartBody');
        tbody.innerHTML = '';
        let total = 0;
        document.getElementById('emptyCartMsg').style.display = cart.length ? 'none' : 'block';

        cart.forEach((item, index) => {
            const sub = (item.price * item.qty) - item.discount;
            total += sub;
            
            tbody.innerHTML += `
                <tr>
                    <td>
                        <div class="fw-bold small">${item.name}</div>
                        <small class="text-muted" style="font-size:10px;">@ Rs.${item.price}</small>
                    </td>
                    <td>
                        <input type="number" class="form-control form-control-sm px-1 text-center" 
                               value="${item.qty}" min="1" max="${item.maxStock}" 
                               onchange="updateQty(${index}, this.value)" style="width: 40px;">
                    </td>
                    <td>
                        <input type="number" class="form-control form-control-sm px-1 text-center text-danger" 
                               value="${item.discount}" min="0" 
                               onchange="updateDisc(${index}, this.value)" style="width: 50px;">
                    </td>
                    <td class="fw-bold small">Rs. ${sub}</td>
                    <td><button class="btn btn-sm text-danger" onclick="remItem(${index})">×</button></td>
                </tr>
            `;
        });
        document.getElementById('grandTotal').innerText = total;
    }

    function updateQty(index, val) {
        let v = parseInt(val);
        if (v < 1) v = 1;
        if (v > cart[index].maxStock) v = cart[index].maxStock;
        cart[index].qty = v;
        renderCart();
    }

    function updateDisc(index, val) {
        let v = parseFloat(val);
        if (v < 0) v = 0;
        cart[index].discount = v;
        renderCart();
    }

    function remItem(index) {
        cart.splice(index, 1);
        renderCart();
    }

    async function submitOrder() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const address = document.getElementById('custAddress').value;

        if (!name || cart.length === 0) return alert("Fill details & add items.");

        const response = await fetch('/create_order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                customer_name: name,
                phone: phone,
                address: address,
                items: cart.map(i => ({ 
                    product_id: i.id, 
                    quantity: i.qty,
                    discount: i.discount 
                }))
            })
        });

        if (response.ok) {
            alert("Order Created!");
            window.location.href = '/';
        }
    }
</script>
{% endblock %}
