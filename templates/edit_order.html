{% extends "layout.html" %}
{% block content %}
<div class="row h-100">
    <div class="col-md-5">
        <div class="card shadow-sm h-100 border-warning">
            <div class="card-header bg-warning text-dark">
                <h5 class="mb-0">Editing Order #{{ order.id }}</h5>
            </div>
            <div class="card-body d-flex flex-column">
                
                <div class="table-responsive flex-grow-1 mb-3" style="max-height: 300px; overflow-y: auto;">
                    <table class="table table-sm table-striped align-middle">
                        <thead class="table-light sticky-top">
                            <tr>
                                <th>Item</th>
                                <th style="width: 60px;">Qty</th>
                                <th>Subtotal</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="cartBody"></tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-between align-items-center border-top pt-3 mb-3">
                    <h4>Total:</h4>
                    <h3 class="text-primary">Rs. <span id="grandTotal">0</span></h3>
                </div>

                <div class="bg-light p-3 rounded">
                    <input type="text" id="custName" class="form-control form-control-sm mb-2" value="{{ order.customer_name }}">
                    <input type="text" id="custPhone" class="form-control form-control-sm mb-2" value="{{ order.phone }}">
                    <textarea id="custAddress" class="form-control form-control-sm mb-2" rows="2">{{ order.address }}</textarea>
                    <button onclick="updateOrder()" class="btn btn-warning w-100 fw-bold">SAVE CHANGES</button>
                    <a href="/orders" class="btn btn-link text-muted w-100 mt-1">Cancel</a>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-7">
        <div class="input-group mb-3">
            <span class="input-group-text bg-white">🔍</span>
            <input type="text" id="searchInput" class="form-control" placeholder="Search products..." onkeyup="filterProducts()">
        </div>

        <div class="row row-cols-1 row-cols-md-3 g-3" id="productGrid" style="max-height: 80vh; overflow-y: auto;">
            {% for p in products %}
            <div class="col product-card-col" data-name="{{ p.name.lower() }} {{ p.sku.lower() if p.sku else '' }}">
                <div class="card h-100 shadow-sm border-0" onclick="addToCart({{ p.id }}, '{{ p.name }}', '{{ p.size }}', {{ p.price }}, {{ p.stock }})" style="cursor: pointer;">
                    <div style="height: 150px; overflow: hidden; background-color: #f8f9fa;" class="d-flex align-items-center justify-content-center">
                        {% if p.image %}
                        <img src="{{ url_for('static', filename='uploads/' + p.image) }}" style="width: 100%; height: 100%; object-fit: cover;">
                        {% else %}
                        <span class="text-muted small">No Img</span>
                        {% endif %}
                    </div>
                    <div class="card-body p-2 text-center">
                        <h6 class="card-title mb-1 text-truncate">{{ p.name }}</h6>
                        <span class="badge bg-light text-dark border">{{ p.size }}</span>
                        <div class="mt-2 text-primary fw-bold">Rs. {{ p.price }}</div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<script>
    let cart = [];
    const ORDER_ID = {{ order.id }};

    // --- PRE-FILL CART WITH EXISTING ITEMS ---
    document.addEventListener("DOMContentLoaded", function() {
        {% for item in order.items %}
            // Note: We add the item's current quantity back to the 'maxStock' logic visually
            // so the user knows they can keep the current items.
            cart.push({
                id: {{ item.product_id }},
                name: "{{ item.product_name }}", 
                price: {{ item.subtotal / item.quantity }},
                qty: {{ item.quantity }},
                maxStock: 999 // In edit mode, we relax the stock check slightly for UX
            });
        {% endfor %}
        renderCart();
    });

    // (Standard Functions: addToCart, remItem, etc.)
    function filterProducts() {
        const input = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.getElementsByClassName('product-card-col');
        for (let card of cards) card.style.display = card.getAttribute('data-name').includes(input) ? "" : "none";
    }

    function addToCart(id, name, size, price, maxStock) {
        const existingItem = cart.find(i => i.id === id);
        if (existingItem) { existingItem.qty++; } 
        else { cart.push({ id, name, size, price, qty: 1, maxStock }); }
        renderCart();
    }

    function renderCart() {
        const tbody = document.getElementById('cartBody');
        tbody.innerHTML = '';
        let total = 0;
        cart.forEach((item, index) => {
            const sub = item.price * item.qty;
            total += sub;
            tbody.innerHTML += `
                <tr>
                    <td><div class="fw-bold">${item.name}</div></td>
                    <td><input type="number" class="form-control form-control-sm px-1 text-center" value="${item.qty}" min="1" onchange="updateQty(${index}, this.value)"></td>
                    <td>Rs. ${sub}</td>
                    <td><button class="btn btn-sm text-danger" onclick="remItem(${index})">×</button></td>
                </tr>`;
        });
        document.getElementById('grandTotal').innerText = total;
    }

    function updateQty(index, newQty) {
        cart[index].qty = parseInt(newQty) < 1 ? 1 : parseInt(newQty);
        renderCart();
    }

    function remItem(index) {
        cart.splice(index, 1);
        renderCart();
    }

    // --- SAVE EDITED ORDER ---
    async function updateOrder() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const address = document.getElementById('custAddress').value;

        if (!name || cart.length === 0) return alert("Cart cannot be empty.");

        const response = await fetch('/update_order_', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                order_id: ORDER_ID,
                customer_name: name,
                phone: phone,
                address: address,
                items: cart.map(i => ({ product_id: i.id, quantity: i.qty }))
            })
        });

        if (response.ok) {
            alert("Order Updated Successfully!");
            window.location.href = '/orders';
        }
    }
</script>
{% endblock %}
