{% extends "layout.html" %}

{% block content %}
<div class="card mx-auto" style="max-width: 500px;">
    <div class="card-header bg-primary text-white">
        Edit Investment
    </div>
    <div class="card-body">
        <form action="/edit_investment/{{ investment.id }}" method="POST">
            <div class="mb-3">
                <label class="form-label">Amount (Rs)</label>
                <input type="number" step="0.01" name="amount" class="form-control" value="{{ investment.amount }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Note</label>
                <input type="text" name="note" class="form-control" value="{{ investment.note }}">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary w-100">Update</button>
                <a href="/" class="btn btn-secondary w-100">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
